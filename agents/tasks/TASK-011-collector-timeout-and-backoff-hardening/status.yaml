notes:
  - created immediately after TASK-010 closeout to continue the live/VOD stabilization track without a supervisor wait step
  - summary_engineer is the first execution owner because app_live_vod.py collector behavior lives on the summary side in the ownership map
  - this slice should stay inside timeout and backoff hardening and should not reopen summary payload, publisher, approval, queueing, dispatch, or broader product polish work
  - `app_live_vod.py` now classifies retryable failures as `timeout`, `network_error`, `rate_limited`, or `http_error` and appends bounded backoff metadata to failed collector-run messages
  - live and VOD collector paths now emit explicit `backoff_active` skipped rows in `collector_runs` instead of re-hitting the upstream immediately after a retryable failure
  - saved evidence proves a bounded pattern of failed -> skipped(backoff) -> completed for both live and one-streamer VOD paths, with no extra fetch call during the skipped backoff window
  - backoff state is currently in-memory only; persistence across process restarts remains a later product-hardening dependency
  - later UI or admin work still depends on surfacing timeout class, backoff state, and recent failed or skipped runs from `collector_runs`
  - workflow D-026 and D-027 were reviewed for this active slice; no same-role micro-loop is authorized now because the slice has already reached the review handoff boundary
  - coordinator checkpoint is now the active gate because review routing is a meaningful baton change under the current workflow rules
  - reviewer confirmed that the saved evidence is sufficient to prove timeout classification, bounded backoff skip behavior, flat fetch-call behavior during backoff, and durable collector-run visibility for both live and one-streamer VOD paths
  - coordinator closed TASK-011 after reviewer marked the slice ready for acceptance; follow-up work remains in later slices for restart-persistent backoff state and richer operational hardening
