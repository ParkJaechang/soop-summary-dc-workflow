notes:
  - Windows Task Scheduler was selected as the single supervisor-specific packaging path for this slice.
  - The packaging contract uses `schtasks.exe` with a named on-demand task entry plus repo-owned run/status/stop/remove wrappers.
  - Local verification proved task registration, packaged start, `/api/health` visibility, and bounded graceful stop through `stop_live_vod_scheduler_task.ps1`.
  - Do not use `End-ScheduledTask` for normal shutdown; the reviewed graceful-stop boundary remains the stop-request-file contract in the launcher runtime directory.
  - Remaining later-slice gaps are service-account or machine-start packaging semantics, alternate supervisors such as NSSM, and non-Windows packaging coverage.
