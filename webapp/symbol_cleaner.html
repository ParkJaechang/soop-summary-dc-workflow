<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>텍스트 기호 제거기</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: rgba(255, 251, 245, 0.94);
      --line: #d9cdb8;
      --text: #2a231b;
      --muted: #6f6253;
      --accent: #bf5a36;
      --accent-2: #dd7a53;
      --shadow: 0 20px 50px rgba(86, 59, 34, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Malgun Gothic", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(191, 90, 54, 0.12), transparent 24%),
        radial-gradient(circle at bottom right, rgba(224, 174, 88, 0.18), transparent 26%),
        linear-gradient(180deg, #efe6d7 0%, #f8f4ed 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: 700;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 36px;
      line-height: 1.08;
    }

    .lead {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.65;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    input,
    button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      color: var(--text);
      background: #fffaf3;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(191, 90, 54, 0.14);
    }

    button {
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }

    .hint {
      border: 1px dashed var(--line);
      background: rgba(255, 255, 255, 0.45);
      border-radius: 18px;
      padding: 14px 16px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
    }

    .status {
      min-height: 24px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .card {
        padding: 24px 18px;
        border-radius: 22px;
      }

      h1 {
        font-size: 29px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Simple Text Tool</div>
    <h1>텍스트 파일에서<br />원하는 기호만 제거</h1>
    <p class="lead">
      텍스트 파일을 올리고 제거할 기호를 입력하면, 그 기호만 삭제된 새 텍스트 파일을 바로 다운로드합니다.
    </p>

    <form class="stack" id="cleanForm">
      <div class="field">
        <label for="textFile">텍스트 파일 업로드</label>
        <input id="textFile" name="text_file" type="file" accept=".txt,text/plain" required />
      </div>

      <div class="field">
        <label for="symbol">제거할 기호</label>
        <input id="symbol" name="symbol" type="text" placeholder="예: # 또는 @@" required />
      </div>

      <button type="submit">기호 제거 후 다운로드</button>

      <div class="hint">
        `#`처럼 한 글자도 되고, `@@`처럼 여러 글자 문자열도 제거할 수 있습니다.
        원본 파일은 건드리지 않고, 결과는 `_cleaned.txt` 이름으로 내려받습니다.
      </div>

      <div class="status" id="status"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById("cleanForm");
    const statusEl = document.getElementById("status");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusEl.textContent = "처리 중입니다...";

      const formData = new FormData(form);

      try {
        const response = await fetch("/api/remove-symbol", {
          method: "POST",
          body: formData,
        });

        if (!response.ok) {
          let message = "처리에 실패했습니다.";
          try {
            const data = await response.json();
            message = data.detail || message;
          } catch (error) {
            console.error(error);
          }
          throw new Error(message);
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        const contentDisposition = response.headers.get("Content-Disposition") || "";
        const matched = contentDisposition.match(/filename="([^"]+)"/i);
        link.href = url;
        link.download = matched ? matched[1] : "cleaned.txt";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        statusEl.textContent = "완료되었습니다. 결과 파일을 다운로드했어요.";
      } catch (error) {
        statusEl.textContent = error.message || "오류가 발생했습니다.";
      }
    });
  </script>
</body>
</html>
